version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: govbank-postgres
    restart: always
    environment:
      POSTGRES_DB: govbank
      POSTGRES_USER: govadmin
      POSTGRES_PASSWORD: govpass
    ports:
      - "55432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data