# ============================================================================
# GOVBANK CORE - POSTGRESQL STANDALONE
# Para desenvolvimento: apenas o banco de dados
# Uso: docker-compose -f docker/postgres/docker-compose.yml up -d
# ============================================================================


services:
  postgres:
    container_name: govbank-postgres-dev
    build:
      context: .
      dockerfile: Dockerfile
    image: govbank/postgres:16-custom
    restart: unless-stopped
    
    environment:
      POSTGRES_DB: govbank_core
      POSTGRES_USER: govbank_app
      POSTGRES_PASSWORD: GovBank@2026!
      PGDATA: /var/lib/postgresql/data/pgdata
    
    ports:
      - "5433:5432"
    
    volumes:
      - ./data:/var/lib/postgresql/data
      - ../../database/govbank_core_fixed.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./init.sql:/docker-entrypoint-initdb.d/02-init.sql:ro
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govbank_app -d govbank_core"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: govbank-dev-network